<div class="shell">
  <admin-bg />
  <app-admin-sidebar></app-admin-sidebar>
  
  <div class="main-wrap">
    <app-admin-header></app-admin-header>
    
    <div class="content">
      <div>
        <div class="page-eyebrow">
          <span class="page-ping"></span> USER MANAGEMENT SYSTEM
        </div>
        <h1 class="page-title">User Registry</h1>
      </div>

      <div class="stat-grid">
        @for (stat of stats(); track stat.label) {
          <div class="stat-card">
            <div class="stat-card__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                @if (stat.label === 'Total Users') { 
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/> 
                }
                @if (stat.label === 'Total Freelancers') { 
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/> 
                }
                @if (stat.label === 'Total Quests') { 
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/> 
                }
              </svg>
            </div>
            <div>
              <p class="stat-card__label">{{ stat.label }}</p>
              <p class="stat-card__value">{{ stat.value }}</p>
            </div>
            <div class="stat-card__glow"></div>
          </div>
        }
      </div>

      <app-users-filter 
        (searchChange)="onSearchChange($event)" 
        (roleChange)="onRoleChange($event)">
      </app-users-filter>

      <app-users-table [users]="users()"></app-users-table>
    </div>

    <app-footer></app-footer>
  </div>
</div>
