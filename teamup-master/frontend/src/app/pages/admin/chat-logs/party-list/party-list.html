<div class="party-list-wrapper">
  <!-- Search -->
  <div class="search-box">
    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" class="search-input" placeholder="Search chat groups..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearch()" />
  </div>

  <!-- Party Items -->
  <div class="party-items">
    @for (party of filteredParties; track party.id) {
    <div class="party-item"
      [class.active]="party.id === selectedPartyId"
      (click)="selectParty(party)">
      <div class="party-avatar">{{ party.avatar }}</div>
      <div class="party-info">
        <span class="party-name">{{ party.name }}</span>
        <div class="party-msg-row">
          <span class="party-last-msg">{{ party.lastMessage }}</span>
          <span class="party-time">{{ party.timeAgo }}</span>
        </div>
      </div>
    </div>
    }
  </div>
</div>
