<div class="filter-container">
  <h2 class="filter-title">Manage Quest</h2>
  <div class="filter-row">
    <div class="search-box">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        type="text"
        class="search-input"
        placeholder="Search quests..."
        [value]="searchTerm"
        (input)="onSearch($event)" />
    </div>

    <div class="role-dropdown">
      <select class="role-select" (change)="onStatusSelect($event)">
        <option value="All Status">All Status</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>
      <svg class="dropdown-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>

    <button class="filter-btn" (click)="onFilter()">Filter</button>
  </div>
</div>
