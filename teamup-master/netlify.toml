[build]
  # Steps into the subfolder to run your Angular production build
  base = "teamup-master/frontend"
  command = "npm run build -- --configuration=production"
  # FIX: Tell Netlify exactly where the build output lands starting from the repository root
  publish = "teamup-master/frontend/dist/frontend"

[functions]
  # FIX: Point Netlify directly to your backend serverless functions folder from the root
  directory = "teamup-master/backend/functions"
  node_bundler = "esbuild"

[[redirects]]
  # Redirects all frontend /api calls to your serverless Express function
  from = "/api/*"
  status = 200
  force = true
  to = "/.netlify/functions/server/:splat"

[[redirects]]
  # The fallback rule so page refreshes don't break routing
  from = "/*"
  status = 200
  to = "/index.html"