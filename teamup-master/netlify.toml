[build]
  # Steps into the subfolder where your package.json and angular.json sit
  base = "teamup-master/frontend"
  command = "npm run build -- --configuration=production"
  # MATCH: Points directly to the outputPath defined in your angular.json file
  publish = "dist/frontend"

[functions]
  # Points Netlify directly to your backend serverless functions folder
  directory = "teamup-master/backend/functions"
  node_bundler = "esbuild"

[[redirects]]
  # Redirects all frontend /api calls to your serverless Express function
  from = "/api/*"
  status = 200
  force = true
  to = "/.netlify/functions/server/:splat"

[[redirects]]
  # The fallback rule so page refreshes don't break routes
  from = "/*"
  status = 200
  to = "/index.html"