[build]
  # No need for --prefix anymore since Netlify starts inside the frontend directory!
  command = "npm run build"
  publish = "dist/frontend/browser"

[functions]
  # Point backward out of the frontend folder and into the backend folder
  directory = "../backend"
  node_bundler = "esbuild"

[dev]
  port = 8888
  functions = "../backend"
  publish = "dist/frontend/browser"

[[redirects]]
  from = "/api/*"
  status = 200
  force = true
  to = "/.netlify/functions/server/:splat"

[[redirects]]
  from = "/*"
  status = 200
  to = "/index.html"